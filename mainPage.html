<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chem-reg</title>
</head>

<body>
    <h1>Chem-reg</h1>

    <p id="welcomeText">Loading session...</p>
    <button id="logoutBtn">Log out</button>

    <hr>

    <h2>Chemical List</h2>
    <p id="chemicalsStatus">Loading chemicals...</p>

    <div id="fetchedChemicals"></div>
    <table id="chemicalsTable" border="1" cellpadding="8">
        <thead>
            <tr>
                <th>Name</th>
                <th>Formula</th>
                <th>Purpose</th>
                <th>Supplier</th>
                <th>Storage</th>
            </tr>
        </thead>
        <tbody id="chemicalsBody">
            <!-- JS inserts rows here -->
        </tbody>
    </table>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="src/Js/supabaseClient.js"></script>
    <script src="src/Js/session.js"></script>
    <script src="src/Js/chemicalsApi.js"></script>
    <script src="src/Js/mainPageScript.js"></script>
    <script type="module">

        const { data } = await supabase.rpc("is_admin");

        if (data === true) {
            const btn = document.getElementById("logoutBtn");
            const link = document.createElement("a");
            link.href = "https://foxesdancing.github.io/Chemical-Register-OHTUII/chemicalForm.html";
            link.textContent = "Add chemical to chemical register";
            btn.insertAdjacentElement("afterend", link);
        }
    </script>
</body>
</html>
