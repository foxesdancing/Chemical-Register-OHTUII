<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Card</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #29a8ab;
      font-family: sans-serif;
    }

    .card {
      background: #ffffff;
      border-radius: 20px;
      padding: 2rem 2rem 1.5rem;
      width: 340px;
      text-align: center;
    }

    .avatar-wrap {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      border: 3px solid #cce8ea;
      margin: 0 auto 1rem;
      overflow: hidden;
      background: #e8f4f5;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .avatar-wrap svg {
      width: 100%;
      height: 100%;
    }

    .name {
      font-size: 22px;
      font-weight: 600;
      color: #29a8ab;
      margin-bottom: 1rem;
    }

    .divider {
      border: none;
      border-top: 1px solid #e5e7eb;
      margin-bottom: 1rem;
    }

    .info-row {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #f5f5f5;
      border-radius: 10px;
      padding: 12px 16px;
      margin-bottom: 10px;
    }

    .info-icon {
      width: 22px;
      height: 22px;
      flex-shrink: 0;
      color: #555555;
    }

    .info-text {
      font-size: 15px;
      color: #444444;
    }
  </style>
</head>
<body>
  <div class="card">

    <div class="avatar-wrap">
      <svg viewBox="0 0 90 90" xmlns="http://www.w3.org/2000/svg">
        <circle cx="45" cy="45" r="45" fill="#c8e6ea"/>
        <ellipse cx="45" cy="38" rx="16" ry="18" fill="#f5c9a0"/>
        <ellipse cx="45" cy="80" rx="26" ry="20" fill="#2a9ba0"/>
        <ellipse cx="45" cy="36" rx="16.5" ry="8" fill="#7b4f2e"/>
        <ellipse cx="29" cy="40" rx="5" ry="8" fill="#7b4f2e"/>
        <ellipse cx="61" cy="40" rx="5" ry="8" fill="#7b4f2e"/>
        <ellipse cx="45" cy="30" rx="17" ry="10" fill="#7b4f2e"/>
      </svg>
    </div>

    <p class="name">Matti Virtanen</p>
    <hr class="divider" />

    <div class="info-row">
      <svg class="info-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81 19.79 19.79 0 01.05 1.2 2 2 0 012.03 0h3a2 2 0 012 1.72c.12.96.36 1.9.71 2.81a2 2 0 01-.45 2.11l-1.27 1.27a16 16 0 006.29 6.29l1.27-1.27a2 2 0 012.11-.45c.91.35 1.85.59 2.81.71A2 2 0 0122 14.92z"/>
      </svg>
      <span class="info-text">+358 40 123 4567</span>
    </div>

    <div class="info-row">
      <svg class="info-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="4" width="20" height="16" rx="2"/>
        <polyline points="2,4 12,13 22,4"/>
      </svg>
      <span class="info-text">matti.virtanen@email.fi</span>
    </div>

  </div>
</body>
</html>
