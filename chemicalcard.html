<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Chemical Register</title>
    <link rel="stylesheet" href="src/css/chemicalcard.css">
</head>

<body>
<!-- Chemical Detail Card -->
<div class="chemical-card">

    <!-- Header -->
    <div class="card-header">
        <h2 class="chemical-name" id="chemicalName"></h2>
        <a href="homepage.html" class="back-button">Back to main page</a>
    </div>


    <!-- Chemical Formula -->
    <div class="card-section">
        <h3>Chemical Formula</h3>
        <p id="chemicalFormula"></p>
        <img id="chemicalImage">
    </div>


    <!-- Use Purpose -->
    <div class="card-section">
        <h3>Use Purpose</h3>
        <p id = chemicalUsePurpose></p>
    </div>


    <!-- Safe Storage -->
    <div class="card-section">
        <h3>Safe Storage</h3>
        <p id="chemicalStorage"></p>
    </div>

    <!-- Hazard Phrases -->
    <div class="card-section">
        <h3>Hazard Phrases</h3>
        <ul id="chemicalHPhrases">
        </ul>
    </div>

    <!-- Precautionary Phrases -->
    <div class="card-section">
        <h3>Precautionary Phrases</h3>
        <ul id="chemicalPPhrases">
        </ul>
    </div>

    <!-- Hazard Pictograms -->
    <div class="card-section">
        <h3>Hazard Pictograms</h3>
        <div class="pictograms" id="chemicalPictograms">
        </div>
    </div>

    <!-- First Aid -->
    <div class="card-section">
        <h3>First Aid Measures</h3>
        <ul id="chemicalFirstAid">
        </ul>
    </div>

    <!-- Safety Data Sheet -->
    <div class="card-section">
        <h3>Safety Data Sheet</h3>
        <a target="_blank" id="chemicalSDS">View SDS Document</a>
    </div>

    <!-- Supplier -->
    <div class="card-section" id="chemicalSupplier">
        <h3>Supplier</h3>
    </div>

    <!-- Expiry Warning -->
<!--     <div class="card-section">
        <h3>Expiry Warning</h3>
        <p class="warning">⚠ This chemical is nearing expiration.</p>
    </div> -->

    <!-- Audit Info -->
<!--     <div class="card-section">
        <h3>Audit Information</h3>
        <p>Last Audit Date: 12.01.2024</p>
    </div> -->

    <!-- Transport Warning -->
<!--     <div class="card-section">
        <h3>Transport Warning Signs</h3>
        <p>Warning signs must be visible during transportation.</p>
    </div> -->

</div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="src/Js/supabaseClient.js"></script>
    <script src="src/Js/session.js"></script>
    <script src="src/Js/chemicalsApi.js"></script>
    <Script src="src/Js/chemicalCard.js" type="module"></Script>

</body>
