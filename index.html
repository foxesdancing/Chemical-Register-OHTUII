<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chemical Register - Login</title>
    <link rel="stylesheet" href="src/css/loginpagestyle.css">
</head>

<body>
    <div class="container">
        <div class="login-card">
            <h1 class="title">Chemical Register</h1>
            <p class="subtitle">Secure Access Portal</p>

            <form class="login-form">
                <div class="input-group">
                    <input 
                        type="email" 
                        placeholder="Email address" 
                        required
                    >
                </div>

                <div class="input-group">
                    <input 
                        type="password" 
                        placeholder="Password" 
                        required
                    >
                </div>

                <button type="submit" class="login-btn">
                    Login
                </button>

                <div class="forgot-password">
                    <a href="#" id="forgotPasswordLink">Forgot Password</a>
                </div>

                <div class="sign-up">
                    <a href="Signup.html">Sign up</a>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="src/Js/supabaseClient.js"></script>
    <script src="src/Js/session.js"></script>
    <script src="src/Js/loginpagescript.js"></script>
</body>
</html>
