<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chemical Register</title>
    <link rel="stylesheet" href="src/css/hompage.css">
    
</head>

<body>

<!-- Header -->
<header class="navbar">

    <div class="logo">
        <svg width="44" height="44" viewBox="0 0 48 48">
            <use href="#logo-icon"/>
        </svg>
        <h2>Chemical Register</h2>
    </div>

    <div class="nav-buttons" id="navButtons">
        <button class="logout-btn" id="logoutBtn">Log Out</button>
        <button class="signup-btn">Profile</button>
    </div>

</header>

<!-- Search Bar -->
<div class="hero">
    <h1>Chemical Register</h1>

    <div class="search-wrapper">
        <div class="search-bar">
            <input type="text" placeholder="Search..." />
            <button class="search-btn">🔍</button>
        </div>
    </div>
</div>

<!-- Chemical cards -->
<section class="cards-container" id="cardsContainer">
</section>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="src/Js/supabaseClient.js"></script>
    <script src="src/Js/session.js"></script>
    <script src="src/Js/chemicalsApi.js"></script>
    <script src="src/Js/mainPageScript.js"></script>
    <script type="module">

        const { data } = await supabase.rpc("is_admin");

        if (data === true) {
            const div = document.getElementById("navButtons");
            const link = document.createElement("a");
            link.href = "https://foxesdancing.github.io/Chemical-Register-OHTUII/chemicalForm.html";
            
            const btn = document.createElement("button");
            btn.className = "signup-btn";
            btn.textContent = "Add a chemical";
            link.appendChild(btn);
            div.appendChild(link);
            
        }
    </script>
</body>
</html>
